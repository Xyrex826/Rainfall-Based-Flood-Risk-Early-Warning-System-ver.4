<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flood Risk Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<body>

<!-- SIDEBAR -->    
<div class="sidebar">
    <div class="sidebar-header">
        
        <br>
        <h2>Flood Watch <span>CDO</span></h2>
        <br><br>
    </div>
    
    <nav class="nav-menu">
        <a href="http://localhost/Version%202.1.6/dashboard.html" class="nav-item">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Dashboard</span>
        </a>
        <a href="http://localhost/Version%202.1.6/barangay_page.html" class="nav-item">
            <i class="fa-solid fa-map-location-dot"></i>
            <span>Barangays</span>
        </a>
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-bell"></i>
            <span>Alerts</span>
        </a>
        <a href="http://localhost/Version%202.1.6/forecast_page.html" class="nav-item">
            <i class="fa-solid fa-cloud-showers-heavy"></i>
            <span>Forecast</span>
        </a>
        <a href="http://localhost/Version%202.1.6/report_page.html" class="nav-item">
            <i class="fa-solid fa-file-contract"></i>
            <span>Reports</span>
        </a>
        
        <div class="nav-divider"></div> <a href="#" class="nav-item">
            <i class="fa-solid fa-gear"></i>
            <span>Settings</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Logs</span>
        </a>
    </nav>
</div>

<!-- MAIN CONTENT -->
 <div class="main">

    <div class="topbar">

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search barangay...">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
        </div>

         <div class="greeting">
            <div class="profile-circle">
                <i class="fa-solid fa-user"></i>
            </div>
            <div>
                <span>Hello there,</span>
                <h3 id="adminName">Admin</h3>
            </div>
        </div>

    </div>

    <h2 style="text-align:center;">Risk Level Summary</h2>
    <br><br>

    <div class="risk-summary">
        <div class="card safe" onclick="openRiskModal('safe')">
        <h3>Safe</h3>  
        <p id="safeCount">3</p>
    </div>

    <div class="card monitor" onclick="openRiskModal('monitor')">
        <h3>Monitor</h3>
        <p id="monitorCount">2</p>
    </div>

    <div class="card alert" onclick="openRiskModal('alert')">
        <h3>Alert</h3>
        <p id="alertCount">3</p>
    </div>

    <div class="card critical" onclick="openRiskModal('critical')">
        <h3>Critical</h3>
        <p id="criticalCount">1</p>
    </div>
    </div>
</main>

    <div id="riskModal" class="modal-overlay" style="display:none;">
    
    <div class="modal-content">

        <h3 id="modalTitle">Risk Level</h3>

        <table class="modal-table">
            <thead>
                <tr>
                    <th>Barangay</th>
                    <th>Risk Level</th>
                </tr>
            </thead>

            <tbody id="riskBarangayList">
            </tbody>
        </table>

        <br>
<button onclick="closeRiskModal()" style="background-color:#e74c3c; color:white; border:none; padding:8px 16px; border-radius:5px; cursor:pointer;">
    Close
</button>

    </div>

</div>

    <script src="alert_page.js"></script>
</body>
</html>
