<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flood Risk Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<body>

<!-- SIDEBAR -->    
<div class="sidebar">
    <div class="sidebar-header">
        
        <br>
        <h2>Flood Watch <span>CDO</span></h2>
        <br><br>
    </div>
    
    <nav class="nav-menu">
        <a href="http://localhost/Version%202.1.6/dashboard.html" class="nav-item ">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-map-location-dot"></i>
            <span>Barangays</span>
        </a>
        <a href="http://localhost/Version%202.1.6/alert_page.html" class="nav-item">
            <i class="fa-solid fa-bell"></i>
            <span>Alerts</span>
        </a>
        <a href="http://localhost/Version%202.1.6/forecast_page.html" class="nav-item ">
            <i class="fa-solid fa-cloud-showers-heavy"></i>
            <span>Forecast</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-file-contract"></i>
            <span>Reports</span>
        </a>
        
        <div class="nav-divider"></div> <a href="#" class="nav-item">
            <i class="fa-solid fa-gear"></i>
            <span>Settings</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Logs</span>
        </a>
    </nav>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <div class="topbar">

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search barangay...">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
        </div>

         <div class="greeting">
            <div class="profile-circle">
                <i class="fa-solid fa-user"></i>
            </div>
            <div>
                <span>Hello there,</span>
                <h3 id="adminName">Admin</h3>
            </div>
        </div>

    </div>

    
    <header class="content-header">
            <div>
                <h1>Barangay Section</h1>
                <p>Unified River Basin & Barangay Risk</p>
            </div>
            <br>
    </header>
    <div class="button-container">
           <button class="add-btn" onclick="openAddForm()">
    <i class="fa-solid fa-plus"></i>
    Add Barangay
</button>
    </div>

    <div class="table-container">
        <table id="barangayTable">

<center>
        <h4 class="section-label">Barangay List</h4>
            <br>
            </center>
            <thead>
                <tr>
                    <th>Barangay</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                    <th>Elevation</th>
                    <th>Geographic Location</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="barangayBody">
                <!-- Data will be populated here by script.js -->
            </tbody>
        </table>
    </div>

    <div id="modalOverlay" class="modal-overlay" style="display:none;">
    <div id="barangayForm" class="modal-content">
        <h3 id="formTitle">Add Barangay</h3>
        <input type="hidden" id="barangayId">

        <div class="form-group">
            <label>Barangay Name</label>
            <input type="text" id="name" placeholder="Enter name">
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Latitude</label>
                <input type="text" id="lat" placeholder="0.0000">
            </div>
            <div class="form-group">
                <label>Longitude</label>
                <input type="text" id="lon" placeholder="0.0000">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Elevation (m)</label>
                <input type="text" id="elev" placeholder="Elevation">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="low_land" disabled>
                    <option value="1">LOWLAND</option>
                    <option value="0">HIGHLAND</option>
                </select>
            </div>
        </div>

        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeForm()" style="background-color: #f43535; color: rgb(255, 255, 255); border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">Cancel</button>
            <button class="btn-primary" onclick="saveBarangay()">Save Barangay</button>
        </div>
    </div>
</div>
<script src="barangay_page.js"></script>
</body>
</html>
